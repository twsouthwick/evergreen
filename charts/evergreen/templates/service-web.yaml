apiVersion: v1
kind: Service
metadata:
  name: {{ include "evergreen.fullname" . }}-web
  labels:
    {{- include "evergreen.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: 80
      protocol: TCP
  selector:
    {{- include "evergreen.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
